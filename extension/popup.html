<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 240px;
            padding: 10px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fafafa;
        }

        #serverUrl {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 11px;
            color: #334155;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        #serverUrl:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
        }

        #recolterBtn {
            width: 100%;
            padding: 8px 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background-color 0.15s;
        }

        #recolterBtn:hover {
            background-color: #2563eb;
        }

        #recolterBtn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        #status {
            margin-top: 6px;
            font-size: 11px;
            color: #64748b;
            text-align: center;
            min-height: 16px;
        }

        #status.error { color: #ef4444; }
        #status.success { color: #22c55e; }

        #serverStatus {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #64748b;
            margin-bottom: 4px;
        }

        #serverStatusDot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            flex-shrink: 0;
        }

        #serverStatusDot.online { background-color: #22c55e; }
        #serverStatusDot.offline { background-color: #ef4444; }

        #authStatus {
            font-size: 10px;
            margin-bottom: 6px;
            min-height: 14px;
        }

        #authStatus.auth-ok { color: #22c55e; }
        #authStatus.auth-ko { color: #f59e0b; }

        #dossiersChoix {
            margin-top: 6px;
            display: none;
        }

        #dossiersChoix .dossier-label {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 4px;
        }

        #dossiersListe {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .btn-dossier {
            font-size: 10px;
            padding: 3px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: white;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-dossier:hover {
            background: #eff6ff;
            border-color: #3b82f6;
            color: #2563eb;
        }

        .btn-dossier.selected {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 4px; margin-bottom: 8px;">
        <input type="text" id="serverUrl" placeholder="http://127.0.0.1:8000/" style="margin-bottom: 0; flex: 1;">
        <button id="saveUrlBtn" style="width: auto; padding: 5px 8px; font-size: 11px; border-radius: 4px; background-color: #64748b;">OK</button>
    </div>
    <div id="serverStatus">
        <span id="serverStatusDot"></span>
        <span id="serverStatusText">Verification...</span>
    </div>
    <div id="authStatus"></div>
    <button id="recolterBtn">Recolter</button>
    <div id="status"></div>
    <div id="dossiersChoix">
        <div class="dossier-label">Classer dans :</div>
        <div id="dossiersListe"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
