# Nginx pour Hypostasia — configuration DEV
# Tout le trafic (HTTP + WebSocket) est proxie vers le runserver ASGI sur le port 8000.
# Le runserver Django avec daphne en premiere position dans INSTALLED_APPS gere les deux.
#
# Utilisation : definir NGINX_CONF=dev.conf dans .env
# / Nginx for Hypostasia — DEV configuration
# / All traffic (HTTP + WebSocket) is proxied to the ASGI runserver on port 8000.
# / Django runserver with daphne first in INSTALLED_APPS handles both.
#
# / Usage: set NGINX_CONF=dev.conf in .env

server {
    listen 80;
    server_name _;
    client_max_body_size 300M;

    # WebSocket → runserver ASGI (port 8000) — upgrade de protocole HTTP → WS
    # / WebSocket → ASGI runserver (port 8000) — HTTP to WS protocol upgrade
    location /ws/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # HTTP → runserver ASGI (port 8000)
    # / HTTP → ASGI runserver (port 8000)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
