# Nginx dev — proxy tout vers le runserver Django sur la machine hote
# / Nginx dev — proxy everything to Django runserver on host machine
# En dev, Django sert static + media directement, nginx est juste le front Traefik

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    location / {
        proxy_pass http://web:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
