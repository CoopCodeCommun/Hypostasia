# Nginx pour Hypostasia — derriere Traefik (reverse proxy TLS)
# / Nginx for Hypostasia — behind Traefik (TLS reverse proxy)
#
# Prod : sert static/ et media/, proxy le reste vers gunicorn (web:8000)
# Dev  : meme config, mais le runserver Django sert tout — nginx optionnel
# / Prod: serves static/ and media/, proxies the rest to gunicorn (web:8000)
# / Dev: same config, but Django runserver serves everything — nginx optional

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # Fichiers statiques collectes par collectstatic
    # / Static files collected by collectstatic
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers media uploades (documents sources, audio)
    # / Uploaded media files (source documents, audio)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Tout le reste → gunicorn / Django
    # / Everything else → gunicorn / Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
