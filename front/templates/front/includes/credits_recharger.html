{# Partial : formulaire de recharge credits (montants predefinis) #}
{# / Partial: credit top-up form (predefined amounts) #}

<div class="p-4" data-testid="credits-recharger" aria-label="Formulaire de recharge des credits">
    <h3 class="text-base font-semibold text-slate-800 mb-3">Choisir un montant</h3>
    <div class="grid grid-cols-2 gap-3">
        {% for montant in montants_recharge %}
        <button type="button"
                class="px-4 py-3 text-lg font-bold text-emerald-700 bg-white border-2 border-emerald-200 rounded-xl hover:bg-emerald-50 hover:border-emerald-400 transition-colors"
                hx-post="/credits/creer_checkout/"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-vals='{"montant_euros": "{{ montant }}"}'
                hx-target="closest div"
                hx-swap="innerHTML"
                data-testid="btn-recharger-{{ montant }}">
            {{ montant }} &euro;
        </button>
        {% endfor %}
    </div>
</div>
