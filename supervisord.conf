[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/tmp/supervisord.pid
user=hypostasia

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:daphne]
command=uv run daphne -b 0.0.0.0 -p 8000 hypostasia.asgi:application
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/daphne.log
stderr_logfile=/app/logs/daphne_err.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB

[program:celery_worker]
command=uv run celery -A hypostasia worker --loglevel=info --concurrency=2
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/celery_worker.log
stderr_logfile=/app/logs/celery_worker_err.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
stopwaitsecs=60
